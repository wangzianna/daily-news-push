name: Weekly Deep Report

on:
  schedule:
    # Sunday 20:07 and 20:27 Beijing time, 12:07 and 12:27 UTC.
    # GitHub may delay or drop jobs at minute 0, so use a backup run.
    - cron: "7 12 * * 0"
    - cron: "27 12 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-deep-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whether this week's report already exists
        id: weekly_exists
        run: |
          report_file="docs/weekly/$(TZ=Asia/Shanghai date +%Y-W%U).html"
          if [ -f "$report_file" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "This week's report already exists: $report_file"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.weekly_exists.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.weekly_exists.outputs.exists != 'true'
        run: pip install -r requirements.txt

      - name: Generate weekly deep report
        if: steps.weekly_exists.outputs.exists != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONPATH: src
        run: python -m daily_news weekly --config config.yaml --sources sources.yaml --no-push

      - name: Upload report artifact
        if: always() && steps.weekly_exists.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: weekly-deep-report
          path: |
            weekly_reports/*.md
            docs/index.html
            docs/weekly/*.html

      - name: Commit HTML report
        if: success() && steps.weekly_exists.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Publish weekly HTML report" || echo "No HTML report changes"
          git push

      - name: Notify Feishu
        if: success() && steps.weekly_exists.outputs.exists != 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PYTHONPATH: src
        run: |
          sleep 60
          python -m daily_news notify-weekly --config config.yaml

      - name: Notify failure
        if: failure() && steps.weekly_exists.outputs.exists != 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PYTHONPATH: src
        run: python -m daily_news notify-status --config config.yaml --title "周末深度报告异常" --status "失败" --details "周报生成、发布或飞书推送过程中有步骤失败，请打开运行日志查看具体原因。"
