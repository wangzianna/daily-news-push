name: Weekly Deep Report

on:
  schedule:
    # Sunday 20:00 Beijing time, 12:00 UTC.
    - cron: "0 12 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-deep-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly deep report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONPATH: src
        run: python -m daily_news weekly --config config.yaml --sources sources.yaml --no-push

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-deep-report
          path: |
            weekly_reports/*.md
            docs/index.html
            docs/weekly/*.html

      - name: Commit HTML report
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Publish weekly HTML report" || echo "No HTML report changes"
          git push

      - name: Notify Feishu
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PYTHONPATH: src
        run: |
          sleep 60
          python -m daily_news notify-weekly --config config.yaml
