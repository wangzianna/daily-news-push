name: Daily News Push

on:
  schedule:
    # 09:07 and 09:27 Beijing time, 01:07 and 01:27 UTC.
    # GitHub may delay or drop jobs at minute 0, so use a backup run.
    - cron: "7 1 * * *"
    - cron: "27 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whether today's report already exists
        id: daily_exists
        run: |
          report_file="docs/daily/$(TZ=Asia/Shanghai date +%F).html"
          if [ -f "$report_file" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Today's report already exists: $report_file"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.daily_exists.outputs.exists != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.daily_exists.outputs.exists != 'true'
        run: pip install -r requirements.txt

      - name: Generate daily report
        if: steps.daily_exists.outputs.exists != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PYTHONPATH: src
        run: python -m daily_news run --config config.yaml --sources sources.yaml --no-push

      - name: Upload report artifact
        if: always() && steps.daily_exists.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-report
          path: |
            reports/*.md
            docs/index.html
            docs/daily/*.html

      - name: Commit HTML report
        if: success() && steps.daily_exists.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Publish daily HTML report" || echo "No HTML report changes"
          git push

      - name: Notify Feishu
        if: success() && steps.daily_exists.outputs.exists != 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PYTHONPATH: src
        run: |
          sleep 60
          python -m daily_news notify-daily --config config.yaml
