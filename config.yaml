app:
  timezone: Asia/Shanghai
  max_items_per_source: 15
  max_items_per_direction_group: 4
  max_items_total: 16
  fetch_timeout_seconds: 20
  user_agent: DailyNewsPush/1.0 (+https://github.com/your-org/daily-news-push)

llm:
  provider: deepseek
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  model: deepseek-v4-flash
  temperature: 0.2

report:
  title: 每日资讯日报
  output_dir: reports
  html_output_dir: docs
  site_base_url: https://wangzianna.github.io/daily-news-push/
  keep_html: 14

weekly_report:
  title: 周末深度报告
  topic: 女性与个人成长
  keywords:
    - 女性
    - 个人成长
    - 职场
    - 健康
    - 心理
    - 教育
    - 家庭
    - 消费
  source_sections:
    - weekly_report_sources
    - sources
  candidate_items: 40
  max_items_per_source: 25
  max_items_per_direction_group: 40
  max_source_items: 24
  output_dir: weekly_reports
  html_output_dir: docs
  site_base_url: https://wangzianna.github.io/daily-news-push/
  keep_html: 8

feishu:
  enabled: true
